name: Release SDK

on:
  push:
    branches: [main]
    paths:
      - packages/sdk/package.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-sdk
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Check version and existing release
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./packages/sdk/package.json').version")
          TAG="sdk-v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.version.outputs.exists == 'false'
        run: npm ci

      - name: Configure git identity
        if: steps.version.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish sdk-dist branch
        if: steps.version.outputs.exists == 'false'
        run: bash scripts/publish-sdk-branch.sh

      - name: Pack tarball
        if: steps.version.outputs.exists == 'false'
        run: |
          cd packages/sdk
          npm pack
          mv pulse-sdk-*.tgz "../../pulse-sdk-${{ steps.version.outputs.version }}.tgz"

      - name: Create GitHub release
        if: steps.version.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "pulse-sdk-${{ steps.version.outputs.version }}.tgz" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "SDK v${{ steps.version.outputs.version }}" \
            --generate-notes
